version: 2

sources:
  - name: raw
    database: analytics
    schema: raw
    description: "Raw source tables loaded via dbt seed"

    tables:
      - name: customers
        description: "Raw customer data. One row per customer."

      - name: applications
        description: "Raw credit card applications. One row per application."

      - name: transactions
        description: "Raw transaction data. One row per transaction."

      - name: credit_limit_history
        description: "Raw credit limit change history. One row per change event."